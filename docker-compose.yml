version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-lobo-api
    restart: always
    ports:
      - "3002:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3001
      - NODE_ENV=development
      - JWT_SECRET=lobo-dev-secret-troque-em-producao
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - lobo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbita-lobo-web
    restart: always
    ports:
      - "3010:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - lobo-network

networks:
  lobo-network:
    driver: bridge
