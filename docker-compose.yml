version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orbita-lobo-db
    restart: always
    environment:
      POSTGRES_USER: lobo_admin
      POSTGRES_PASSWORD: LoboSuperSenha2026
      POSTGRES_DB: orbitalobo_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_lobo_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lobo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-lobo-api
    restart: always
    ports:
      - "3002:3001"
    environment:
      - DATABASE_URL=postgresql://lobo_admin:LoboSuperSenha2026@db:5432/orbitalobo_db
      - PORT=3001
      - NODE_ENV=development
      - JWT_SECRET=lobo-dev-secret-troque-em-producao
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - lobo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbita-lobo-web
    restart: always
    ports:
      - "3010:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - lobo-network

volumes:
  postgres_lobo_data:
    driver: local

networks:
  lobo-network:
    driver: bridge
